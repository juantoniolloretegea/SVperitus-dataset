name: Build Rust WASM Engine

on:
  push:
    branches: [main]
    paths:
      - 'entornos/rust/wasm/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          cd entornos/rust/wasm
          wasm-pack build --target web --out-dir ../../../aplicaciones/demo_wasm/pkg --release
          rm -f ../../../aplicaciones/demo_wasm/pkg/.gitignore
          rm -f ../../../aplicaciones/demo_wasm/pkg/package.json
          rm -f ../../../aplicaciones/demo_wasm/pkg/*.d.ts

      - name: Commit WASM build
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build: WASM engine compiled from entornos/rust/wasm/ source"
          file_pattern: "aplicaciones/demo_wasm/pkg/*"
