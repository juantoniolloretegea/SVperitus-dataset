name: Deploy Kotlin IMMUNO-1 Client to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "kotlin/imm1_client/**"
      - ".github/workflows/kotlin-imm1-client-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-kotlin-imm1-client"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Build Kotlin/JS client
        run: gradle -p kotlin/imm1_client browserProductionWebpack

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site

          if [ -d "kotlin/imm1_client/build/dist/js/productionExecutable" ]; then
            cp -R kotlin/imm1_client/build/dist/js/productionExecutable/. _site/
          elif [ -d "kotlin/imm1_client/build/distributions" ]; then
            cp -R kotlin/imm1_client/build/distributions/. _site/
          else
            echo "No known Kotlin/JS output directory found."
            echo "Build tree:"
            find kotlin/imm1_client/build -maxdepth 5 -print | sort
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
