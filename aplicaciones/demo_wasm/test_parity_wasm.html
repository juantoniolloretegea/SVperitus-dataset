    // ── Funciones de test ──
    function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        return a.every((v, i) => v === b[i]);
    }

    function testImmuno2(tc) {
        const jsonInput = JSON.stringify(tc.input);
        const resultJson = wasm.evaluate_immuno2(jsonInput);
        const result = JSON.parse(resultJson);
        if (result.error) return { pass: false, detail: 'Error: ' + result.error };

        const vectorMatch = arraysEqual(result.vector, tc.expected.vector);
        const classMatch = result.global_class === tc.expected.global_class;
        const n0Match = result.n0 === tc.expected.n0;
        const n1Match = result.n1 === tc.expected.n1;
        const nuMatch = result.nU === tc.expected.nU;

        const pass = vectorMatch && classMatch && n0Match && n1Match && nuMatch;
        let detail = '';
        if (!vectorMatch) detail += `Vector: esperado ${tc.expected.vector} got ${result.vector}. `;
        if (!classMatch) detail += `Clase: esperado ${tc.expected.global_class} got ${result.global_class}. `;
        if (!n0Match) detail += `n0: ${tc.expected.n0} vs ${result.n0}. `;
        if (!n1Match) detail += `n1: ${tc.expected.n1} vs ${result.n1}. `;
        if (!nuMatch) detail += `nU: ${tc.expected.nU} vs ${result.nU}. `;
        return { pass, detail: pass ? 'OK' : detail };
    }

        const classMatch = result.global_class === tc.expected.global_class;
        const vetoMatch = result.vetoed === tc.expected.vetoed;

        const pass = vectorMatch && classMatch && vetoMatch;
        let detail = '';
        if (!vectorMatch) detail += `Vector: esperado ${tc.expected.vector} got ${result.vector}. `;
        if (!classMatch) detail += `Clase: esperado ${tc.expected.global_class} got ${result.global_class}. `;
        if (!vetoMatch) detail += `Vetoed: esperado ${tc.expected.vetoed} got ${result.vetoed}. `;
        return { pass, detail: pass ? 'OK' : detail };
    }

    // ── Ejecutar tests ──
    const resultsDiv = document.getElementById('results');
    let passed = 0;
    let failed = 0;

    for (const tc of PARITY_CASES.cases) {
        let result;
        if (tc.module === 'immuno2') {
            result = testImmuno2(tc);
        } else if (tc.module === 'meta') {
            result = testMeta(tc);
        } else {
            result = { pass: false, detail: 'Módulo desconocido: ' + tc.module };
        }

        if (result.pass) passed++; else failed++;

        const div = document.createElement('div');
        div.className = 'result ' + (result.pass ? 'pass' : 'fail');
        div.textContent = `${result.pass ? '✓' : '✗'} ${tc.id} → ${result.detail}`;
        resultsDiv.appendChild(div);
    }

    // ── Resumen ──
    const summaryDiv = document.getElementById('summary');
    const allPass = failed === 0;
    summaryDiv.className = allPass ? 'pass' : 'fail';
    summaryDiv.style.borderColor = allPass ? '#22c55e' : '#ef4444';
    summaryDiv.textContent = `${passed} pasados, ${failed} fallados de ${passed + failed}`;

    // ── Test bonus: engine_info_v2 ──
    try {
        const info = JSON.parse(wasm.engine_info_v2());
        const infoDiv = document.createElement('div');
        infoDiv.className = 'result pass';
        infoDiv.textContent = '✓ engine_info_v2() → ' + JSON.stringify(info);
        resultsDiv.appendChild(infoDiv);
    } catch(e) {
        const infoDiv = document.createElement('div');
        infoDiv.className = 'result warn';
        infoDiv.textContent = '? engine_info_v2() no disponible (puede ser versión antigua)';
        resultsDiv.appendChild(infoDiv);
    }

    // ── Test retrocompatibilidad: engine_info original ──
    try {
        const info = JSON.parse(wasm.engine_info());
        const expected = '108/108';
        const match = info.parity === expected;
        const div = document.createElement('div');
        div.className = 'result ' + (match ? 'pass' : 'fail');
        div.textContent = `${match ? '✓' : '✗'} engine_info() retrocompatible → parity=${info.parity}`;
        resultsDiv.appendChild(div);
    } catch(e) {
        const div = document.createElement('div');
        div.className = 'result fail';
        div.textContent = '✗ engine_info() falló: ' + e.message;
        resultsDiv.appendChild(div);
    }
    </script>
</body>
</html>
