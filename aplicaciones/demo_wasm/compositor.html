    // ═══════════════════════════════════════════
    //  Γ(v) — JavaScript (NO en WASM)
    // ═══════════════════════════════════════════
    function calcGamma(vector, n, t) {
        if (!n) n = vector.length;
        if (!t) t = Math.floor(7*n/9);
        const n0 = vector.filter(v=>v==="0").length;
        const n1 = vector.filter(v=>v==="1").length;
        const m  = vector.filter(v=>v==="U").length;
        const d0 = t - n0, d1 = t - n1;
        const mu = Math.min(d0, d1);
        const gamma = m - mu;
        let cls, interp;
        if (gamma < 0) {
            cls = "irreducible";
            interp = `Ni resolviendo las ${m} U pendientes se alcanza clasificación. No se necesitan más pruebas; se necesita que cambien los parámetros conocidos.`;
        } else if (gamma === 0) {
            cls = "fronteriza";
            interp = `Cada U es decisiva. Resolver cualquiera en sentido desfavorable cierra la puerta a clasificación definitiva.`;
        } else {
            const nearest = d0<=d1 ? "APTO" : "NO_APTO";
            cls = "resoluble";
            interp = `Puede permitirse hasta ${gamma} resultados desfavorables y aún alcanzar ${nearest}.`;
        }
        return { n0, n1, m, d0, d1, mu, gamma, cls, interp };
    }

    // ═══════════════════════════════════════════
    //  POLAR POLYGON SVG
    // ═══════════════════════════════════════════
    function Polygon({ vector, size=300, color="#c9a84c", cellColor="#38bdf8", label="", classResult="" }) {
        const n = vector.length;
        const cx=size/2, cy=size/2, baseR=size*0.12, stepR=size*0.11, maxR=baseR+3*stepR;
        const radiusMap={"0":1,"1":2,"U":3};
        const fillColor = classResult==="APTO"||classResult==="NORMAL" ? "rgba(34,197,94,0.18)"
            : classResult==="NO_APTO"||classResult==="INTRUSIÓN" ? "rgba(239,68,68,0.18)"
            : "rgba(250,204,21,0.15)";

        const pts = vector.map((v,i)=>{
            const a = -Math.PI/2 + i*2*Math.PI/n;
            const r = baseR + radiusMap[v]*stepR;
            return {
                x: cx+Math.cos(a)*r, y: cy+Math.sin(a)*r,
                lx: cx+Math.cos(a)*(maxR+size*0.06), ly: cy+Math.sin(a)*(maxR+size*0.06),
                v, key: `P${String(i+1).padStart(2,'0')}`
            };
        });
        const poly = pts.map(p=>`${p.x},${p.y}`).join(" ");

        // For meta-cell (n=9) use M labels
        const getLabel = (i) => n===9 ? `M${i+1}` : `P${String(i+1).padStart(2,'0')}`;

        return (
            <div>
                {label && <div className="text-center text-xs font-semibold mb-1 tracking-wide" style={{color:cellColor}}>{label}</div>}
                <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-auto rounded-xl" style={{background:"#0D1B2A"}}>
                    {[1,2,3].map(l=><circle key={l} cx={cx} cy={cy} r={baseR+l*stepR} fill="none" stroke="rgba(255,255,255,0.2)" strokeDasharray="4 4"/>)}
                    {pts.map((pt,i)=><line key={i} x1={cx} y1={cy} x2={pt.x} y2={pt.y} stroke="rgba(255,255,255,0.12)"/>)}
                    <polygon points={poly} fill={fillColor} stroke={color} strokeWidth="2"/>
                    {pts.map((pt,i)=>(
                        <g key={i}>
                            <circle cx={pt.x} cy={pt.y} r={n<=9?5:3.5} fill={pt.v==="0"?COL.apt:pt.v==="1"?COL.notapt:COL.indet}/>
                            <text x={pt.lx} y={pt.ly} fill="white" fontSize={n<=9?11:8} fontWeight="bold" textAnchor="middle" dominantBaseline="middle" fontFamily="JetBrains Mono">{getLabel(i)}</text>
                        </g>
                    ))}
                </svg>
            </div>
        );
    }

    // ═══════════════════════════════════════════
    //  CLASS BADGE
    // ═══════════════════════════════════════════
    function ClassBadge({ cls, size="text-base" }) {
        const bg = cls==="APTO"||cls==="NORMAL" ? "bg-emerald-900/40 border-emerald-500 text-emerald-300"

        return <div className={`rounded-lg border px-3 py-1.5 font-bold text-center font-mono ${size} ${bg}`}>{cls}</div>;
    }

    // ═══════════════════════════════════════════
    //  COMPACT FORM (for IMMUNO-1 or IMMUNO-2)
    // ═══════════════════════════════════════════
    function CompactForm({ params, layers, values, onChange, lockedP25, cellColor, cellName }) {
        const opts = [{v:"0",l:"0",c:"bg-emerald-700/60 border-emerald-500"},
                      {v:"1",l:"1",c:"bg-red-700/60 border-red-500"},
                      {v:"U",l:"U",c:"bg-amber-700/50 border-amber-500"}];
        return (
            <div className="space-y-3">
                <div className="text-sm font-bold tracking-wide" style={{color:cellColor}}>{cellName}</div>
                {layers.map((layer,li)=>(
                    <div key={li}>
                        <div className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-1">{layer}</div>
                        <div className="space-y-1">
                            {params.slice(li*5,li*5+5).map((p,pi)=>{
                                const idx = li*5+pi;
                                const isLocked = lockedP25 && idx===24;
                                return (
                                    <div key={p.k} className="flex items-center gap-2">
                                        <span className="w-8 text-[10px] font-mono font-bold text-slate-400">{p.k}</span>
                                        <span className="flex-1 text-xs text-slate-300 truncate" title={p.l}>{p.l}</span>
                                        {isLocked ? (
                                            <div className="flex gap-0.5">
                                                <div className="w-7 h-6 rounded border text-[10px] font-mono font-bold flex items-center justify-center"
                                                     style={{background:"rgba(201,168,76,0.3)",borderColor:"#c9a84c",color:"#c9a84c"}}>
                                                    {values[p.k]}
                                                </div>
                                                <span className="text-[8px] text-amber-500 self-center ml-0.5">⛓</span>
                                            </div>
                                        ) : (
                                            <div className="flex gap-0.5">
                                                {opts.map(o=>(
                                                    <button key={o.v} onClick={()=>onChange(p.k,o.v)}
                                                        className={`w-7 h-6 rounded border text-[10px] font-mono font-bold transition-all
                                                            ${values[p.k]===o.v ? o.c+" text-white" : "border-slate-600 text-slate-500 hover:border-slate-400"}`}>
                                                        {o.l}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                ))}
            </div>
        );
    }

    // ═══════════════════════════════════════════
    //  GAMMA PANEL
    // ═══════════════════════════════════════════
    function GammaPanel({ vector, label, color }) {
        const n0 = vector.filter(v=>v==="0").length;
        const n1 = vector.filter(v=>v==="1").length;
        const t = Math.floor(7*vector.length/9);
        // Only show Γ for INDETERMINADO vectors
        if (n1 >= t || n0 >= t) return null;
        const g = calcGamma(vector);
        const gColor = g.gamma < 0 ? "text-red-400" : g.gamma === 0 ? "text-amber-400" : "text-emerald-400";
        const gLabel = g.gamma < 0 ? "Irreducible" : g.gamma === 0 ? "Fronteriza" : "Resoluble";
        return (
            <div className="rounded-lg border border-slate-600 p-3 text-xs" style={{borderLeftColor:color,borderLeftWidth:3}}>
                <div className="flex items-center gap-2 mb-1">
                    <span className="font-bold text-slate-300">{label}</span>
                    <span className={`font-mono font-bold ${gColor}`}>Γ = {g.gamma}</span>
                    <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${gColor} bg-slate-800`}>{gLabel}</span>
                </div>
                <div className="text-slate-400 font-mono text-[10px] mb-1">
                    m={g.m} · δ₀={g.d0} · δ₁={g.d1} · μ={g.mu}
                </div>
                <div className="text-slate-400">{g.interp}</div>
            </div>
        );
    }

                    <rect x="410" y="290" width="240" height="100" rx="12" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" strokeWidth="2"/>
                    <text x="530" y="320" fill="#a78bfa" fontSize="14" fontWeight="bold" textAnchor="middle" fontFamily="JetBrains Mono">IMMUNO-2</text>
                    <text x="530" y="340" fill="#94a3b8" fontSize="10" textAnchor="middle">SV(25,5) · T(25)=19</text>
                    <text x="530" y="358" fill="#94a3b8" fontSize="10" textAnchor="middle">Riesgo infeccioso en IS</text>
                    <text x="530" y="376" fill="#64748b" fontSize="9" textAnchor="middle">Conector experimental (P25)</text>

                    {/* Gamma */}
                    <rect x="200" y="420" width="300" height="70" rx="12" fill="rgba(250,204,21,0.08)" stroke="#facc15" strokeWidth="1.5" strokeDasharray="6 3"/>
                    <text x="350" y="448" fill="#facc15" fontSize="13" fontWeight="bold" textAnchor="middle" fontFamily="JetBrains Mono">Γ(v) = m − μ</text>
                    <text x="350" y="468" fill="#94a3b8" fontSize="10" textAnchor="middle">Criticidad de la indeterminación · Calculado en JavaScript</text>

                    {/* Legend */}
                    <circle cx="40" cy="480" r="5" fill="#22c55e"/><text x="52" y="484" fill="#94a3b8" fontSize="9">0 = Apto (r=1)</text>
                    <circle cx="160" cy="480" r="5" fill="#ef4444"/><text x="172" y="484" fill="#94a3b8" fontSize="9">1 = No_Apto (r=2)</text>
                    <circle cx="300" cy="480" r="5" fill="#facc15"/><text x="312" y="484" fill="#94a3b8" fontSize="9">U = Indeterminado (r=3)</text>
                    <circle cx="465" cy="480" r="5" fill="#c9a84c"/><text x="477" y="484" fill="#94a3b8" fontSize="9">Puente compositor</text>
                </svg>

                <div className="mt-8 grid md:grid-cols-3 gap-4 text-sm">
                    <div className="rounded-xl border border-slate-700 p-4 bg-slate-800/50">
                        <div className="font-bold text-slate-200 mb-2">Composición en serie</div>
                        <p className="text-slate-400 text-xs">La clase global de IMMUNO-1 se inyecta como P25 de IMMUNO-2: APTO→0, NO_APTO→1, INDETERMINADO→U. P25 es un conector experimental, no una validación clínica.</p>
                    </div>
                    <div className="rounded-xl border border-slate-700 p-4 bg-slate-800/50">
                        <div className="font-bold text-slate-200 mb-2">Meta-célula de integridad</div>
                        <p className="text-slate-400 text-xs">9 parámetros de integridad del sistema. Si n₁≥7 → INTRUSIÓN: se anulan los resultados clínicos. No editable por el usuario.</p>
                    </div>
                    <div className="rounded-xl border border-slate-700 p-4 bg-slate-800/50">
                        <div className="font-bold text-slate-200 mb-2">Función Γ(v)</div>
                        <p className="text-slate-400 text-xs">Clasifica la indeterminación en irreducible, fronteriza o resoluble. Matemática exacta. Sin estadística. Calculada en JavaScript, no en WASM.</p>
                    </div>
                </div>
            </div>
        );
    }

    // ═══════════════════════════════════════════
    //  COMPOSITOR TAB
    // ═══════════════════════════════════════════
    function CompositorTab() {
        const initV = (params) => Object.fromEntries(params.map(p=>[p.k,"U"]));
        const [v1, setV1] = useState(initV(IMM1_PARAMS));
        const [v2, setV2] = useState(initV(IMM2_PARAMS));
        const [simIntrusion, setSimIntrusion] = useState(false);

        const onV1 = useCallback((k,val) => setV1(prev=>({...prev,[k]:val})), []);
        const onV2 = useCallback((k,val) => setV2(prev=>({...prev,[k]:val})), []);

        // Build meta state based on simulation
        const metaState = simIntrusion
            ? {weights_integrity:false,dataset_provenance:false,access_control:false,adversarial_tests:false,
               telemetry_active:false,environment_isolation:false,immutable_logging:false,human_oversight:true,supply_chain_integrity:true}
            : {weights_integrity:true,dataset_provenance:true,access_control:true,adversarial_tests:true,
               telemetry_active:true,environment_isolation:true,immutable_logging:true,human_oversight:true,supply_chain_integrity:true};

        // ── Evaluate via WASM ──
        const result = useMemo(() => {
            if (!window.__wasm) return null;
            try {
                const json = window.__wasm.compose(
                    JSON.stringify(buildImm1Case(v1)),
                    JSON.stringify(buildImm2Case(v2)),
                    JSON.stringify(metaState)
                );
                return JSON.parse(json);
            } catch(e) { return {error: e.message}; }
        }, [v1, v2, simIntrusion]);

        if (!result) return <div className="text-center text-slate-400 py-12">Motor WASM no disponible</div>;
        if (result.error) return <div className="text-center text-red-400 py-12">Error: {result.error}</div>;

        const r1 = result.immuno1;
        const r2 = result.immuno2;
        const rm = result.meta;

        // Update v2.P25 display based on bridge
        const v2Display = {...v2, P25: r2.bridge_value};

        // Quick presets
        const resetAll = () => { setV1(initV(IMM1_PARAMS)); setV2(initV(IMM2_PARAMS)); setSimIntrusion(false); };
        const presetApto = () => {
            const a1 = {}; IMM1_PARAMS.forEach(p=>{a1[p.k]="0"});
            const a2 = {}; IMM2_PARAMS.forEach(p=>{a2[p.k]="0"});
            setV1(a1); setV2(a2); setSimIntrusion(false);
        };

        return (
            <div className="fade-in">
                {/* ── Status bar ── */}
                <div className="rounded-xl border border-slate-700 bg-slate-800/60 p-4 mb-4">
                    <div className="flex flex-wrap items-center justify-center gap-3 text-sm">
                        <div className="flex items-center gap-2">
                            <span className="font-mono font-bold" style={{color:COL.imm1}}>IMMUNO-1</span>
                            <ClassBadge cls={r1.global_class} size="text-xs"/>
                        </div>
                        <span className="text-2xl" style={{color:COL.bridge}}>→</span>
                        <div className="font-mono text-xs px-2 py-1 rounded border" style={{borderColor:COL.bridge,color:COL.bridge}}>
                            P25 = {r2.bridge_value}
                        </div>
                        <span className="text-2xl" style={{color:COL.bridge}}>→</span>
                        <div className="flex items-center gap-2">
                            <span className="font-mono font-bold" style={{color:COL.imm2}}>IMMUNO-2</span>
                            <ClassBadge cls={r2.global_class} size="text-xs"/>
                        </div>
                        <span className="text-slate-600 mx-2">|</span>
                        <div className="flex items-center gap-2">
                            <span className="font-mono font-bold" style={{color:COL.meta}}>META</span>
                            <ClassBadge cls={rm.global_class} size="text-xs"/>
                        </div>
                        {rm.vetoed && <span className="text-red-400 font-bold text-xs animate-pulse">⛔ RESULTADOS ANULADOS</span>}
                    </div>
                    <div className="flex justify-center gap-2 mt-3">
                        <button onClick={resetAll} className="px-3 py-1 rounded-lg bg-slate-700 text-slate-300 text-xs hover:bg-slate-600">Todo U</button>
                        <button onClick={presetApto} className="px-3 py-1 rounded-lg bg-emerald-900/50 text-emerald-300 border border-emerald-700 text-xs hover:bg-emerald-900">Ejemplo APTO</button>
                    </div>
                </div>

                <div className="grid lg:grid-cols-2 gap-4 mb-4">
                    {/* ── IMMUNO-1 form ── */}
                    <div className="rounded-xl border border-slate-700 bg-slate-800/40 p-4">
                        <CompactForm params={IMM1_PARAMS} layers={IMM1_LAYERS} values={v1}
                            onChange={onV1} cellColor={COL.imm1} cellName="IMMUNO-1 — Profilaxis antiinfecciosa"/>
                    </div>
                    {/* ── IMMUNO-2 form ── */}
                    <div className="rounded-xl border border-slate-700 bg-slate-800/40 p-4">
                        <CompactForm params={IMM2_PARAMS} layers={IMM2_LAYERS} values={v2Display}
                            onChange={onV2} lockedP25={true} cellColor={COL.imm2} cellName="IMMUNO-2 — Riesgo infeccioso en IS"/>
                    </div>
                </div>

                {/* ── Three polygons ── */}
                <div className="grid grid-cols-3 gap-3 mb-4">
                    <div className="rounded-xl border border-slate-700 bg-slate-800/40 p-3">
                        <Polygon vector={r1.vector} size={300} color={COL.imm1} cellColor={COL.imm1}
                            label="IMMUNO-1" classResult={r1.global_class}/>
                        <div className="mt-2 text-center">
                            <ClassBadge cls={r1.global_class} size="text-sm"/>
                            <div className="text-[10px] font-mono text-slate-500 mt-1">n₀={r1.n0} · n₁={r1.n1} · nU={r1.nU}</div>
                        </div>
                    </div>
                    <div className="rounded-xl border border-slate-700 bg-slate-800/40 p-3">
                        <Polygon vector={r2.vector} size={300} color={COL.imm2} cellColor={COL.imm2}
                            label="IMMUNO-2" classResult={r2.global_class}/>
                        <div className="mt-2 text-center">
                            <ClassBadge cls={r2.global_class} size="text-sm"/>
                            <div className="text-[10px] font-mono text-slate-500 mt-1">n₀={r2.n0} · n₁={r2.n1} · nU={r2.nU} · P25={r2.bridge_value}</div>
                        </div>
                    </div>
                    <div className="rounded-xl border border-slate-700 bg-slate-800/40 p-3">
                        <Polygon vector={rm.vector} size={300} color={COL.meta} cellColor={COL.meta}
                            label="META-CÉLULA" classResult={rm.global_class}/>
                        <div className="mt-2 text-center">
                            <ClassBadge cls={rm.global_class} size="text-sm"/>
                            <div className="text-[10px] font-mono text-slate-500 mt-1">n₀={rm.n0} · n₁={rm.n1} · nU={rm.nU}</div>
                        </div>
                        <div className="mt-2">
                            <button onClick={()=>setSimIntrusion(!simIntrusion)}
                                className={`w-full text-xs py-1.5 rounded-lg border font-bold transition-all
                                    ${simIntrusion
                                        ? "bg-red-900/50 border-red-500 text-red-300 hover:bg-red-900/70"
                                        : "bg-slate-700 border-slate-600 text-slate-300 hover:bg-slate-600"}`}>
                                {simIntrusion ? "⛔ Intrusión simulada" : "Simular intrusión"}
                            </button>
                            <div className="text-[9px] text-slate-500 mt-1 text-center">
                                Simulación. En producción, la meta-célula es automática.
                            </div>
                        </div>
                    </div>
                </div>

                {/* ── Γ Panel ── */}
                <div className="rounded-xl border border-slate-700 bg-slate-800/40 p-4 space-y-2">
                    <div className="text-sm font-bold text-slate-200 mb-2 font-mono">Γ(v) — Criticidad de la indeterminación</div>
                    <GammaPanel vector={r1.vector} label="IMMUNO-1" color={COL.imm1}/>
                    <GammaPanel vector={r2.vector} label="IMMUNO-2" color={COL.imm2}/>
                    <GammaPanel vector={rm.vector} label="Meta-célula" color={COL.meta}/>
                    {r1.global_class!=="INDETERMINADO" && r2.global_class!=="INDETERMINADO" && rm.global_class!=="INDETERMINADO" && (
                        <div className="text-xs text-slate-500 text-center py-2">Ninguna célula está en INDETERMINADO — Γ no aplica.</div>
                    )}
                </div>

                {/* ── Disclaimer ── */}
                <div className="mt-4 rounded-xl border border-amber-800/50 bg-amber-900/20 p-3 text-xs text-amber-300/80 text-center">
                    ⚠️ Demostrador experimental del mecanismo de composición. No validado en datos reales. No utilice este sistema para decisiones clínicas.
                    La composición serie (P25) es un conector experimental, no una validación clínica de la dependencia entre profilaxis y riesgo infeccioso.
                </div>
            </div>
        );
    }

    // ═══════════════════════════════════════════
    //  APP
    // ═══════════════════════════════════════════
    function App() {
        const [engineStatus, setEngineStatus] = useState(window.__engine_status || 'loading');
        const [tab, setTab] = useState("compositor");

        useEffect(() => {
            const handler = () => setEngineStatus(window.__engine_status);
            window.addEventListener('engine-ready', handler);
            return () => window.removeEventListener('engine-ready', handler);
        }, []);

        if (engineStatus === 'loading') {
            return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="text-center">
                        <div className="text-4xl mb-4">⚙️</div>
                        <p className="text-xl">Cargando motor Rust (WebAssembly)...</p>
                        <p className="text-slate-400 mt-2 text-sm">El código se ejecuta localmente en su navegador.</p>
                    </div>
                </div>
            );
        }

        if (engineStatus === 'error') {
            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="max-w-md bg-slate-800 rounded-2xl border border-slate-700 p-8 text-center">
                        <div className="text-4xl mb-4">🔧</div>
                        <h1 className="text-xl font-bold">Motor WASM no disponible</h1>
                        <p className="mt-3 text-sm text-slate-400">El motor Rust necesita ser compilado. Consulte GitHub Actions.</p>
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen">
                {/* ── Header ── */}
                <div className="border-b border-slate-800 bg-[#0d1628]">
                    <div className="max-w-7xl mx-auto px-4 py-4">
                        <div className="flex flex-wrap items-end justify-between gap-3">
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">SVperitus — Compositor</h1>
                                <p className="text-xs text-slate-500 mt-0.5">ISSN 2695-6411 · CC BY-NC-ND 4.0 · J.A. Lloret Egea · Motor Rust (WebAssembly)</p>
                            </div>
                            <div className="px-2.5 py-1 rounded-full border border-orange-700 bg-orange-900/30 text-orange-300 text-xs font-mono">
                                🦀 WASM activo
                            </div>
                        </div>
                        {/* ── Tabs ── */}
                        <div className="flex gap-6 mt-4 text-sm font-semibold">
                            <button onClick={()=>setTab("arquitectura")}
                                className={`pb-2 transition-all ${tab==="arquitectura"?"tab-active":"tab-inactive"}`}>
                                Arquitectura
                            </button>
                            <button onClick={()=>setTab("compositor")}
                                className={`pb-2 transition-all ${tab==="compositor"?"tab-active":"tab-inactive"}`}>
                                Compositor interactivo
                            </button>
                        </div>
                    </div>
                </div>

                {/* ── Content ── */}
                <div className="max-w-7xl mx-auto px-4 py-6">
                    {tab === "arquitectura" ? <ArchitectureTab/> : <CompositorTab/>}
                </div>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>
</html>
