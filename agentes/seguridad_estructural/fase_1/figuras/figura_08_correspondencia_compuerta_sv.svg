<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="960" viewBox="0 0 1200 960">
<rect width="1200" height="900" fill="#ffffff"/>
<rect x="8" y="8" width="1184" height="944" rx="24" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.30"/>

<defs>
<marker id="arr" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
  <path d="M0,0 L11,5.5 L0,11 z" fill="#b45309"/>
</marker>
</defs>

<!-- TÍTULO -->
<text x="600" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">Figura 8. Correspondencia expositiva entre álgebra, tabla de resolución</text>
<text x="600" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">y diagrama funcional de compuerta SV</text>

<!-- ===== TRES BLOQUES: izq=360px · central=462px · der=300px ===== -->
<rect x="30"  y="146" width="360" height="756" rx="16" fill="#f8fafc" stroke="#1d4ed8"  stroke-width="2.5"/>
<rect x="406" y="146" width="462" height="756" rx="16" fill="#f8fafc" stroke="#0f766e" stroke-width="2.5"/>
<rect x="884" y="146" width="292" height="756" rx="16" fill="#f8fafc" stroke="#b45309" stroke-width="2.5"/>

<!-- ======================================= -->
<!-- BLOQUE IZQUIERDO — Forma algebraica    -->
<!-- ======================================= -->
<text x="210" y="296" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">Forma algebraica</text>

<!-- Nivel 1 -->
<text x="52" y="334" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">Nivel 1 · suelo</text>
<text x="52" y="358" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">S_suelo = T_suelo(C_obj^9, C_base^9)</text>
<text x="52" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">Entradas: C_obj^9 y C_base^9</text>
<text x="52" y="402" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">Regla: 1 domina; U se conserva;</text>
<text x="52" y="418" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">0 sólo cierra si ambos son 0</text>

<line x1="52" y1="438" x2="372" y2="438" stroke="#cbd5e1" stroke-width="1"/>

<!-- Nivel 2 -->
<text x="52" y="462" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">Nivel 2 · custodia final</text>
<text x="52" y="486" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">A_custodia = T_cust(</text>
<text x="70" y="504" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#374151">C_diseno^36, S_suelo)</text>
<text x="52" y="530" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">Entradas: C_diseno^36 y S_suelo</text>
<text x="52" y="548" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">Regla: misma disciplina conservadora</text>
<text x="52" y="564" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">en el segundo piso</text>

<line x1="52" y1="586" x2="372" y2="586" stroke="#cbd5e1" stroke-width="1"/>

<!-- Lectura mínima -->
<text x="52" y="612" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">Lectura mínima</text>
<text x="52" y="636" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">• La composición no es monolítica.</text>
<text x="52" y="656" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">• La salida no blanquea entradas no aptas.</text>
<text x="52" y="676" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">• U no se clausura por atajo.</text>

<line x1="52" y1="696" x2="372" y2="696" stroke="#cbd5e1" stroke-width="1"/>

<!-- Nota arquitectura -->
<text x="52" y="720" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" font-style="italic">La arquitectura no es SV(54) monolítica:</text>
<text x="52" y="738" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" font-style="italic">es una composición visible por pisos.</text>

<!-- ======================================= -->
<!-- BLOQUE CENTRAL — Tabla                 -->
<!-- ======================================= -->
<text x="637" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f766e">Tabla de resolución ternaria conservadora</text>
<text x="637" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Misma disciplina conservadora — distinta función jerárquica por nivel</text>

