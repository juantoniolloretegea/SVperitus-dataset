<text x="465" y="589" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0f172a">APTO</text>
<!-- Row 3 data -->
<text x="567" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">NO_</text>
<text x="567" y="589" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">APTO</text>
<text x="682" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">NO_</text>
<text x="682" y="589" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">APTO</text>
<text x="798" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">NO_</text>
<text x="798" y="589" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">APTO</text>

<!-- Notas bajo tabla -->
<text x="637" y="640" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">APTO sólo si ambas entradas son aptas.</text>
<text x="637" y="660" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">NO_APTO domina si aparece en cualquiera de las entradas.</text>
<text x="637" y="680" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">INDETERMINADO se conserva cuando no existe cierre legítimo.</text>

<text x="637" y="714" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f766e">Esta tabla no equivale a validación binaria.</text>
<text x="637" y="734" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Es una tabla de resolución ternaria conservadora del SV.</text>

<!-- ======================================= -->
<!-- BLOQUE DERECHO — Diagrama funcional    -->
<!-- ======================================= -->
<text x="1030" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#b45309">Diagrama funcional</text>
<text x="1030" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#b45309">por bloques</text>

<!-- T_suelo box -->
<rect x="948" y="368" width="96" height="44" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2.5"/>
<text x="996" y="395" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">T_suelo</text>

<!-- T_cust box — bajado para dar espacio al tramo S_suelo vertical -->
<rect x="948" y="560" width="96" height="44" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="2.5"/>
<text x="996" y="587" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">T_cust</text>

<!-- Entradas C_obj^9 y C_base^9 — entran por la izquierda de T_suelo -->
<line x1="900" y1="380" x2="946" y2="380" stroke="#b45309" stroke-width="2" marker-end="url(#arr)"/>
<line x1="900" y1="398" x2="946" y2="398" stroke="#b45309" stroke-width="2" marker-end="url(#arr)"/>
<text x="923" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827">C_obj^9</text>
<text x="923" y="416" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827">C_base^9</text>

<!-- S_suelo: flecha vertical DIRECTA de la base de T_suelo a la cima de T_cust -->
<line x1="996" y1="412" x2="996" y2="558" stroke="#b45309" stroke-width="2.5" marker-end="url(#arr)"/>
<!-- Etiqueta S_suelo a la derecha del tramo vertical, centrada -->
<text x="1012" y="490" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827">S_suelo</text>

<!-- C_diseno^36 entra por la izquierda de T_cust -->
<line x1="900" y1="582" x2="946" y2="582" stroke="#b45309" stroke-width="2" marker-end="url(#arr)"/>
<text x="923" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827">C_diseno^36</text>

<!-- A_custodia sale por la DERECHA de T_cust — sin confusión con S_suelo -->
<line x1="1044" y1="582" x2="1148" y2="582" stroke="#b45309" stroke-width="2.5" marker-end="url(#arr)"/>
<text x="1096" y="600" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827">A_custodia</text>

<!-- Notas texto inferior derecho -->
<text x="1030" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">El bloque superior no corrige</text>
<text x="1030" y="668" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">al inferior por intuición.</text>
<text x="1030" y="694" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">Sólo compone con regla visible</text>
<text x="1030" y="712" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155">y salida trazable.</text>

