<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
<rect width="1200" height="900" fill="#ffffff"/>
<rect x="8" y="8" width="1184" height="884" rx="24" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.30"/>

<!-- Título -->
<text x="600" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#111827">Figura 2. Célula de custodia del diseño C_diseño³⁶ — seis capas, treinta y seis posiciones</text>

<!-- Encabezado -->
<rect x="40" y="64" width="1120" height="50" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="600" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#4f46e5">b = 6 · n = 36 · T(36) = 28 · Semántica: 0 = conforme · 1 = infracción · U = indeterminación honesta</text>
<text x="600" y="104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Cada posición es verificable por documento, repo, script, parser, render o salida de laboratorio. Canales declarados por capa.</text>

<!-- ============ CAPA A ============ -->
<rect x="40" y="124" width="170" height="100" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
<text x="125" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">A — Anclaje</text>
<text x="125" y="163" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8">doctrinal</text>
<text x="125" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#374151">manuscrito · README</text>
<text x="125" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#374151">front matter · bibliografía</text>
<text x="125" y="212" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6b7280">notas doctrinales</text>

<rect x="220" y="124" width="960" height="100" rx="10" fill="#f8fafc" stroke="#1d4ed8" stroke-width="1.5"/>
<text x="310" y="150" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">A1</tspan> Filiación doctrinal explícita</text>
<text x="310" y="166" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">A2</tspan> Límite superior humano enunciado</text>
<text x="310" y="182" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">A3</tspan> Alfabeto correcto · no degrada U</text>
<text x="700" y="150" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">A4</tspan> Horizonte de sucesos declarado (→ VII.3)</text>
<text x="700" y="166" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">A5</tspan> Estatuto textual correcto</text>
<text x="700" y="182" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">A6</tspan> Bibliografía troncal suficiente</text>

