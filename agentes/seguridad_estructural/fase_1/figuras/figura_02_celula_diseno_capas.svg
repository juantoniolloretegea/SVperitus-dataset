<text x="700" y="260" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">B4</tspan> No-aplica separado de U</text>
<text x="700" y="276" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">B5</tspan> Umbral o tabla visible</text>
<text x="700" y="292" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">B6</tspan> Repetibilidad local</text>

