<text x="700" y="512" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">D6</tspan> Trazabilidad suficiente y visible</text>
<text x="700" y="528" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#475569">sin artefactos decisivos no absorbidos</text>

