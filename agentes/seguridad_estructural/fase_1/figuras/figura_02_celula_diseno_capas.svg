<text x="700" y="606" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">E5</tspan> QA de presentación</text>
<text x="700" y="622" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">E6</tspan> Persistencia de U cuando no hay base de cierre</text>

