<text x="310" y="496" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">D2</tspan> Índices y README coherentes</text>
<text x="310" y="512" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">D3</tspan> Referencias de figuras y laboratorios válidas</text>
<text x="700" y="480" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#111827"><tspan font-weight="700">D4</tspan> Autoría y metadatos completos</text>
