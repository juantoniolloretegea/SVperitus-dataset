<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">

<rect width="1200" height="800" fill="#ffffff"/>
<rect x="8" y="8" width="1184" height="784" rx="24" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.30"/>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#1d4ed8"/></marker></defs>
<text x="600" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#111827">Figura 4. Flujo clásico de custodia — lectura de proceso</text>
<rect x="470" y="80" width="260" height="54" rx="27" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
<text x="600" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">Inicio del sprint / pieza a custodiar</text>
<line x1="600" y1="134" x2="600" y2="170" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="430" y="170" width="340" height="62" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="600" y="197" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Captura material: manuscrito, repo,</text>
<text x="600" y="215" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">laboratorio y figuras</text>
<line x1="600" y1="232" x2="600" y2="270" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="430" y="270" width="340" height="62" rx="14" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
<text x="600" y="297" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Clasificar C_obj^9 y C_base^9 con criterios</text>
<text x="600" y="315" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">visibles</text>
<line x1="600" y1="332" x2="600" y2="370" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="430" y="370" width="340" height="62" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
<text x="600" y="397" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Resolver T_suelo -> S_suelo con compuerta</text>
<text x="600" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">conservadora</text>
<line x1="600" y1="432" x2="600" y2="470" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="430" y="470" width="340" height="62" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="600" y="497" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">Clasificar C_diseno^36 por capas A-F y tabla</text>
<text x="600" y="515" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#111827">completa</text>
<line x1="600" y1="532" x2="600" y2="560" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arrow)"/>
<polygon points="600,560 720,640 600,720 480,640" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
<text x="600" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#92400e">¿Existe 1 o U</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#92400e">en S_suelo o C_diseno?</text>
<line x1="720" y1="640" x2="1020" y2="640" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="860" y="622" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#92400e">Sí</text>
<rect x="1020" y="606" width="140" height="68" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
<text x="1090" y="636" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#dc2626">Cierre</text>
<text x="1090" y="658" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">NO_APTO o</text>
<text x="1090" y="676" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#111827">INDETERMINADO</text>
<line x1="600" y1="720" x2="600" y2="758" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="620" y="742" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#92400e">No</text>
<rect x="470" y="758" width="260" height="30" rx="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="600" y="778" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#15803d">Cierre APTO trazable</text>
</svg>