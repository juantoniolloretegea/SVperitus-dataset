<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
<rect width="1200" height="900" fill="#ffffff"/>
<rect x="8" y="8" width="1184" height="884" rx="24" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.30"/>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
<path d="M0,0 L12,6 L0,12 z" fill="#1d4ed8"/>
</marker>
<linearGradient id="bgExt" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/>
</linearGradient>
<linearGradient id="bgInt" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#f0f9ff"/><stop offset="100%" stop-color="#bae6fd"/>
</linearGradient>
<linearGradient id="bgDis" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#eef2ff"/><stop offset="100%" stop-color="#c7d2fe"/>
</linearGradient>
<linearGradient id="bgSeg" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#bbf7d0"/>
</linearGradient>
<linearGradient id="bgFinal" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#1e3a8a"/>
</linearGradient>
