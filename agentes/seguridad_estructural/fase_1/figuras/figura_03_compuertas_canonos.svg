<!-- ======= DOCE CÁNONES ======= -->
<rect x="570" y="78" width="600" height="500" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="870" y="104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">Doce cánones de protección del DSL</text>
<line x1="590" y1="114" x2="1150" y2="114" stroke="#e2e8f0" stroke-width="1"/>

<!-- Cánones col izq -->
<text x="590" y="136" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C1</text>
<text x="613" y="136" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Especificación soberana sobre compilador</text>
<text x="590" y="156" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C2</text>
<text x="613" y="156" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Verificación previa a ejecución</text>
<text x="590" y="176" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C3</text>
<text x="613" y="176" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Zonas de escape visibles y auditadas</text>
<text x="590" y="196" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C4</text>
<text x="613" y="196" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Perfiles normativos por criticidad</text>
<text x="590" y="216" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C5</text>
<text x="613" y="216" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Preservación semántica como horizonte</text>
<text x="590" y="236" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C6</text>
<text x="613" y="236" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">IR estratificado: especif · eval · consulta · ejec</text>

<text x="590" y="266" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C7</text>
<text x="613" y="266" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Parser y serialización no ambiguos</text>
<text x="590" y="286" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C8</text>
<text x="613" y="286" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Verificador con corpus propio de pruebas</text>
<text x="590" y="306" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C9</text>
<text x="613" y="306" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Laboratorio encapsulado · no backend clandestino</text>
<text x="590" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C10</text>
<text x="616" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Trazabilidad de U · invariante lingüístico</text>
<text x="590" y="346" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C11</text>
<text x="616" y="346" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Reevaluación por suceso declarado (→ VII.3)</text>
<text x="590" y="366" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">C12</text>
<text x="616" y="366" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Lectura para terceros especialistas</text>

<line x1="590" y1="382" x2="1150" y2="382" stroke="#e2e8f0" stroke-width="1"/>

<text x="870" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#374151">Correspondencia cánones → Capa C de C_diseño³⁶</text>
<text x="590" y="424" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C1 → C1 (traducibilidad a SVP)   C2 → C6 (validabilidad previa)</text>
<text x="590" y="442" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C3 → C5 (sin atajo opaco)         C4 → perfiles de despliegue · Capa F</text>
<text x="590" y="460" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C6 → C2 (tipado visible)           C7 → C4 (totalidad de tabla)</text>
<text x="590" y="478" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C8 → C8 (corpus de pruebas)      C9 → E1–E3 (laboratorio)</text>
<text x="590" y="496" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C10 → B4 · B3 · E6 (persistencia de U)</text>
<text x="590" y="514" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C11 → A4 (horizonte de sucesos · VII.3)</text>
<text x="590" y="532" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C12 → F6 (salida para terceros)</text>

<line x1="590" y1="548" x2="1150" y2="548" stroke="#e2e8f0" stroke-width="1"/>
<text x="870" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#6b7280">Anclaje bibliográfico: CompCert · SPARK · WebAssembly · eBPF verifier</text>

<!-- Casos canónicos síntesis -->
<rect x="60" y="570" width="460" height="220" rx="12" fill="#f8fafc" stroke="#6b7280" stroke-width="1.5"/>
<text x="290" y="594" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#111827">Cuatro casos canónicos</text>
<line x1="80" y1="604" x2="500" y2="604" stroke="#e2e8f0" stroke-width="1"/>

<text x="80" y="624" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#16a34a">Caso 1 — Custodia apta</text>
<text x="80" y="640" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C_obj=A · C_base=A · C_dis=A → S_suelo=A · A_cust=APTO</text>

<text x="80" y="664" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#dc2626">Caso 2 — Suelo corrupto</text>
<text x="80" y="680" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C_obj=A · C_base=NA · C_dis=A → S_suelo=NA · A_cust=NO_APTO</text>

<text x="80" y="704" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#b45309">Caso 3 — Diseño indeterminado</text>
<text x="80" y="720" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">C_obj=A · C_base=A · C_dis=I → S_suelo=A · A_cust=INDET.</text>

<text x="80" y="744" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#6b7280">Caso 4 — Tensión geométrica</text>
<text x="80" y="760" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Misma clase algebraica · carta ℝ³ distinta → alerta adversarial</text>
<text x="80" y="776" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280" font-style="italic">La geometría documenta; la compuerta decide.</text>

