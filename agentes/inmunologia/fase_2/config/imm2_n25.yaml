# ============================================================
# SVperitus – IMMUNO-2  |  Configuración del módulo n=25
# ============================================================
# Módulo: Estratificación del riesgo de infección grave en
#         adultos con inmunosupresión farmacológica sistémica
#         no trasplante
# Serie: «Células del Sistema Vector ternario en inmunología clínica»
# Autor: Juan Antonio Lloret Egea  |  ORCID: 0000-0002-6634-3351
# ISSN 2695-6411  |  CC BY-NC-ND 4.0
# Estado: Versión de trabajo — Capa 1 revisada; Capas 2–5 en revisión especializada
# ============================================================

module: IMMUNO-2
n: 25          # Tamaño de la célula: b=5, n=b²=25
b: 5           # Lado del cuadrado de parámetros

# ----------------------------------------------------------
# Umbral de clasificación global
#   T(n) = floor(7n/9) = floor(7*25/9) = floor(19.44) = 19
# ----------------------------------------------------------
threshold: 19

# ----------------------------------------------------------
# Clases de clasificación global
# ----------------------------------------------------------
classes:
  - NO_APTO
  - INDETERMINADO
  - APTO

class_to_idx:
  NO_APTO: 0
  INDETERMINADO: 1
  APTO: 2

# ----------------------------------------------------------
# Semántica ternaria
# ----------------------------------------------------------
ternary_semantics:
  "0": "Riesgo aceptable / situación favorable"
  "1": "Riesgo elevado / situación desfavorable"
  "U": "No valorable / información insuficiente"

# ----------------------------------------------------------
# Convención visual del polígono polar
# ----------------------------------------------------------
polygon_visual:
  radius_0: 1
  radius_1: 2
  radius_U: 3
  background_color: "#0D1B2A"
  polygon_color: "#C9A84C"
  vertex_colors:
    "0": "#4CAF50"
    "1": "#F44336"
    "U": "#FFC107"
  image_size: 224

# ----------------------------------------------------------
# Población diana
# ----------------------------------------------------------
population: >
  Adultos (≥18 años) en tratamiento activo o reciente (≤6 meses)
  con bDMARDs, tsDMARDs o IS convencionales mayores,
  con o sin corticoides sistémicos.
  Exclusiones: TOS, TPH/CAR-T, quimioterapia citotóxica pura, VIH primario.

# ----------------------------------------------------------
# Estructura de los 25 parámetros (5 capas × 5 parámetros)
# ----------------------------------------------------------
layers:
  - id: 1
    name: "Terreno basal del huésped"
    parameters:
      - id: P01
        name: "Edad"
        description: "Edad del paciente como factor de riesgo independiente"
      - id: P02
        name: "Comorbilidad cardiometabólica y renal"
        description: "DM complicada, ICC, ERC, cardiopatía isquémica"
      - id: P03
        name: "Enfermedad pulmonar crónica"
        description: "EPOC, EPI, bronquiectasias, exacerbaciones"
      - id: P04
        name: "Hepatopatía crónica"
        description: "Fibrosis, cirrosis, VHB/VHC activa"
      - id: P05
        name: "Estado nutricional y fragilidad"
        description: "IMC, albúmina, criterios de fragilidad"

  - id: 2
    name: "Carga y tipo de inmunosupresión"
    parameters:
      - id: P06
        name: "Tipo de fármaco IS principal"
        description: "Convencional vs JAKi/anti-CD20/ciclofosfamida"
      - id: P07
        name: "Combinación de inmunosupresores"
        description: "Monoterapia vs combinación múltiple"
      - id: P08
        name: "Dosis equivalente de corticoides"
        description: "Prednisona equivalente, duración, pulsos"
      - id: P09
        name: "Duración acumulada de IS"
        description: "Tiempo bajo IS, cambios de línea"
      - id: P10
        name: "Linfopenia relevante"
        description: "Linfocitos absolutos en contexto de IS"

  - id: 3
    name: "Barreras, dispositivos y anatomía crítica"
    parameters:
      - id: P11
        name: "Integridad de piel y mucosas"
        description: "Úlceras, mucositis, heridas no cicatrizadas"
      - id: P12
        name: "Catéteres venosos centrales"
        description: "Port-a-cath, PICC, Hickman, hemodiálisis"
      - id: P13
        name: "Prótesis y biomateriales"
        description: "Prótesis articulares/vasculares, tiempo desde implante"
      - id: P14
        name: "Cirugía mayor reciente"
        description: "Cirugía mayor en últimos 30 días"
      - id: P15
        name: "Esplenectomía o hipoesplenismo"
        description: "Asplenia quirúrgica o funcional"

  - id: 4
    name: "Exposición epidemiológica documentable"
    parameters:
      - id: P16
        name: "Hospitalización reciente"
        description: "Ingreso ≥48h en últimos 30 días"
      - id: P17
        name: "Colonización por MDR"
        description: "MRSA, BLEE, EPC, VRE en últimos 12 meses"
      - id: P18
        name: "Zona endémica de tuberculosis"
        description: "Residencia/estancia en zona alta endemia TB"
      - id: P19
        name: "Exposición respiratoria de alto riesgo"
        description: "Contacto con TB activa, COVID grave, brote nosocomial"
      - id: P20
        name: "Exposición a entornos de alto riesgo fúngico"
        description: "Obras hospitalarias, zonas endémicas de micosis"

  - id: 5
    name: "Protección residual, historia infecciosa y puente IMMUNO-1"
    parameters:
      - id: P21
        name: "Historia de infecciones graves recientes"
        description: "Infección grave (hospitalización o IV) en últimos 12 meses"
      - id: P22
        name: "Inmunoglobulinas séricas (IgG)"
        description: "Nivel de IgG como marcador de protección humoral"
      - id: P23
        name: "Intensificación reciente del régimen IS"
        description: "Cambio o escalada de IS en últimos 3 meses"
      - id: P24
        name: "Evaluación integral de riesgo infeccioso"
        description: "Screening TB, serologías, vacunación, profilaxis"
      - id: P25
        name: "Parámetro puente con IMMUNO-1"
        description: "Clase global de IMMUNO-1 inyectada por el compositor"

# ----------------------------------------------------------
# Parámetros de generación del dataset sintético
# ----------------------------------------------------------
dataset:
  seed: 42
  total_images: 3000
  split:
    train: 0.70
    val:   0.15
    test:  0.15

# ----------------------------------------------------------
# Parámetros de entrenamiento (ResNet34)
# ----------------------------------------------------------
training:
  architecture: resnet34
  pretrained: true
  epochs: 30
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  num_workers: 4
