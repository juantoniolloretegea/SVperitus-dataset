# ============================================================
# SVperitus – IMMUNO-1  |  Configuración del módulo n=25
# ============================================================
# Módulo: Profilaxis infecciosa y vacunación en adultos
#         con neoplasias hematológicas e inmunosupresión
# Documento 7 de la serie «De SVcustos a SVperitus»
# Autor: Juan Antonio Lloret Egea  |  ORCID: 0000-0002-6634-3351
# ISSN 2695-6411  |  CC BY-NC-ND 4.0
# ============================================================

module: IMMUNO-1
n: 25          # Tamaño de la célula: b=5, n=b²=25
b: 5           # Lado del cuadrado de parámetros

# ----------------------------------------------------------
# Umbral de clasificación global
#   T(n) = floor(7n/9) = floor(7*25/9) = floor(19.44) = 19
# ----------------------------------------------------------
threshold: 19

# ----------------------------------------------------------
# Clases de clasificación global
#   No_Apto     : n₁ ≥ threshold   (riesgo alto dominante)
#   Apto        : n₀ ≥ threshold   (situación adecuada dominante)
#   Indeterminado: resto
# Orden de severidad: No_Apto > Indeterminado > Apto
# ----------------------------------------------------------
classes:
  - NO_APTO
  - INDETERMINADO
  - APTO

# Etiquetas enteras para uso en PyTorch DataLoader
class_to_idx:
  NO_APTO: 0
  INDETERMINADO: 1
  APTO: 2

# ----------------------------------------------------------
# Semántica ternaria en el dominio de competencias
# ----------------------------------------------------------
ternary_semantics:
  "0": "Situación adecuada / aceptable según guías"
  "1": "Situación de riesgo alto o claramente inadecuada"
  "U": "Información insuficiente o zona gris (no clasificable como 0 o 1)"

# ----------------------------------------------------------
# Convención visual del polígono polar
#   (idéntica a SVcustos para coherencia de familia)
# ----------------------------------------------------------
polygon_visual:
  radius_0: 1       # círculo interior  → situación adecuada
  radius_1: 2       # círculo medio     → riesgo / inadecuado
  radius_U: 3       # círculo exterior  → indeterminado
  background_color: "#0D1B2A"
  polygon_color: "#C9A84C"     # dorado, igual que SVcustos
  vertex_colors:
    "0": "#4CAF50"   # verde
    "1": "#F44336"   # rojo
    "U": "#FFC107"   # amarillo
  image_size: 224   # px (entrada nativa ResNet)

# ----------------------------------------------------------
# Estructura de los 25 parámetros (5 capas × 5 parámetros)
# ----------------------------------------------------------
# CAPA 1: Estado inmunitario basal
# CAPA 2: Neoplasia de base y tratamiento inmunosupresor
# CAPA 3: Historia infecciosa y colonización
# CAPA 4: Estado vacunal
# CAPA 5: Profilaxis y seguimiento
#
# NOTA: Los criterios 0/1/U se definen en normative_engine.py; generate_cases.py los utiliza para crear casos sintéticos.
# ----------------------------------------------------------
layers:
  - id: 1
    name: "Estado inmunitario basal"
    parameters:
      - id: P01
        name: "Neutropenia"
        description: "Recuento absoluto de neutrófilos y duración de la neutropenia"
      - id: P02
        name: "Linfopenia"
        description: "Recuento de linfocitos CD4+ / linfocitos totales"
      - id: P03
        name: "Inmunoglobulinas"
        description: "Niveles séricos de IgG (y otras Ig relevantes)"
      - id: P04
        name: "Esplenectomía / hipoesplenismo"
        description: "Estado funcional del bazo"
      - id: P05
        name: "Barreras y catéteres"
        description: "Integridad de barreras mucosas y presencia de catéteres vasculares"

  - id: 2
    name: "Neoplasia de base y tratamiento inmunosupresor"
    parameters:
      - id: P06
        name: "Tipo y fase de la hemopatía"
        description: "Diagnóstico hematológico y fase (inducción, remisión, recaída…)"
      - id: P07
        name: "Intensidad de quimioterapia"
        description: "Régimen quimioterápico y grado de mielosupresión esperado"
      - id: P08
        name: "Agentes biológicos"
        description: "Anti-CD20, inhibidores de BTK, venetoclax u otros biológicos inmunosupresores"
      - id: P09
        name: "TPH / CAR-T"
        description: "Trasplante de progenitores hematopoyéticos o terapia CAR-T (tipo, fase, EICH)"
      - id: P10
        name: "Corticoides sistémicos"
        description: "Dosis y duración de corticoterapia sistémica"

  - id: 3
    name: "Historia infecciosa y colonización"
    parameters:
      - id: P11
        name: "Infecciones bacterianas graves previas"
        description: "Bacteriemias, sepsis, neumonías graves en los últimos 12 meses"
      - id: P12
        name: "Infecciones fúngicas invasoras"
        description: "Aspergilosis, candidiasis invasora u otras IFI previas o activas"
      - id: P13
        name: "Infecciones virales crónicas / latentes"
        description: "VHB, VHC, CMV, VEB, VVZ, VHS u otras reactivaciones relevantes"
      - id: P14
        name: "Colonización por microorganismos multirresistentes"
        description: "MRSA, BLEE, EPC u otros MDR con impacto en profilaxis"
      - id: P15
        name: "Exposición sanitaria reciente"
        description: "Hospitalizaciones prolongadas, procedimientos invasivos recientes"

  - id: 4
    name: "Estado vacunal"
    parameters:
      - id: P16
        name: "Vacunación antigripal"
        description: "Estado de vacunación frente a influenza (última dosis)"
      - id: P17
        name: "Vacunación antineumocócica"
        description: "Secuencia PCV20/PCV15 + PPSV23 según guías vigentes"
      - id: P18
        name: "Vacunación frente a SARS-CoV-2"
        description: "Pauta primaria y dosis de refuerzo frente a COVID-19"
      - id: P19
        name: "Vacunación frente a hepatitis B"
        description: "Serología anti-HBs y necesidad de revacunación / HBIG"
      - id: P20
        name: "Otras vacunas inactivadas relevantes"
        description: "VHA, meningococo, Hib, tétanos-difteria-pertussis según indicación"

  - id: 5
    name: "Profilaxis y seguimiento"
    parameters:
      - id: P21
        name: "Profilaxis frente a Pneumocystis jirovecii (PJP)"
        description: "TMP-SMX u alternativa según riesgo y tolerancia"
      - id: P22
        name: "Profilaxis antiviral"
        description: "Aciclovir/valaciclovir (VHS/VVZ) y/o valganciclovir (CMV) según indicación"
      - id: P23
        name: "Profilaxis antifúngica"
        description: "Fluconazol, posaconazol u otros azoles según nivel de riesgo"
      - id: P24
        name: "Profilaxis antibacteriana en neutropenia de alto riesgo"
        description: "Fluoroquinolona u otra antibacteriana en neutropenia prolongada"
      - id: P25
        name: "Plan de reevaluación del riesgo y estado vacunal"
        description: "Calendario de revisión del riesgo infeccioso y de la respuesta vacunal"

# ----------------------------------------------------------
# Parámetros de generación del dataset sintético
# ----------------------------------------------------------
dataset:
  seed: 42
  total_images: 3000       # 1000 por clase
  split:
    train: 0.70            # 700 por clase
    val:   0.15            # 150 por clase
    test:  0.15            # 150 por clase

# ----------------------------------------------------------
# Parámetros de entrenamiento (ResNet34)
# ----------------------------------------------------------
training:
  architecture: convnext_tiny
  historical_baseline: resnet34
  pretrained: true
  epochs: 30
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine        # CosineAnnealingLR
  num_workers: 4
